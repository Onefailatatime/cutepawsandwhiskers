<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Water ripple background -->
  <circle cx="60" cy="60" r="56" fill="#e0f2fe" stroke="#bae6fd" stroke-width="2"/>
  <ellipse cx="60" cy="60" rx="48" ry="48" fill="#f0f9ff" opacity="0.5"/>
  <!-- Water ripples -->
  <path d="M20 55c10-4 20 4 30 0s20-4 30 0s20 4 30 0" stroke="#93c5fd" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M15 65c10-3 20 3 30 0s20-3 30 0s20 3 35 0" stroke="#93c5fd" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Tadpole body -->
  <ellipse cx="55" cy="58" rx="16" ry="11" fill="#3b82f6" opacity="0.9"/>
  <ellipse cx="55" cy="58" rx="14" ry="9" fill="#60a5fa"/>
  <!-- Tadpole head (bigger round part) -->
  <circle cx="48" cy="58" r="12" fill="#3b82f6"/>
  <circle cx="48" cy="58" r="10.5" fill="#60a5fa"/>
  <!-- Eye -->
  <circle cx="43" cy="55" r="3.5" fill="white"/>
  <circle cx="42" cy="54.5" r="2" fill="#1e3a5f"/>
  <circle cx="41.5" cy="53.8" r="0.7" fill="white"/>
  <!-- Tail (wavy) -->
  <path d="M68 58 Q75 52 80 56 Q85 60 90 54 Q93 50 96 53" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M68 58 Q75 64 80 60 Q85 56 90 62 Q93 66 96 63" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Bubbles -->
  <circle cx="35" cy="42" r="3" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <circle cx="30" cy="35" r="2" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
  <circle cx="40" cy="38" r="1.5" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>
</svg>