<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Murky water background -->
  <circle cx="60" cy="60" r="56" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <ellipse cx="60" cy="60" rx="48" ry="48" fill="#fffbeb" opacity="0.5"/>
  <!-- Murky swirls -->
  <path d="M25 50c15-6 25 6 40 0s25-6 35 2" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M20 70c12-4 22 4 35 0s22-4 32 2" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Koi body -->
  <ellipse cx="58" cy="60" rx="24" ry="13" fill="#f59e0b" opacity="0.9"/>
  <ellipse cx="58" cy="60" rx="22" ry="11" fill="#fbbf24"/>
  <!-- Head -->
  <ellipse cx="40" cy="60" rx="14" ry="12" fill="#f59e0b"/>
  <ellipse cx="40" cy="60" rx="12.5" ry="10.5" fill="#fbbf24"/>
  <!-- Orange patches -->
  <ellipse cx="52" cy="56" rx="6" ry="4" fill="#ea580c" opacity="0.5"/>
  <ellipse cx="62" cy="63" rx="5" ry="3.5" fill="#ea580c" opacity="0.4"/>
  <!-- Eye -->
  <circle cx="34" cy="57" r="4" fill="white"/>
  <circle cx="33" cy="56.5" r="2.3" fill="#78350f"/>
  <circle cx="32.3" cy="55.8" r="0.8" fill="white"/>
  <!-- Mouth -->
  <path d="M27 62 Q29 64 32 63" stroke="#b45309" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <path d="M28 60 Q22 57 18 55" stroke="#b45309" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M28 62 Q22 63 17 65" stroke="#b45309" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Dorsal fin -->
  <path d="M50 48 Q55 38 62 47" fill="#f59e0b" opacity="0.7"/>
  <!-- Tail fin -->
  <path d="M78 55 Q88 45 95 50 Q90 58 95 66 Q88 72 78 62" fill="#f59e0b" opacity="0.8"/>
  <path d="M78 55 Q86 48 92 52" stroke="#d97706" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M78 62 Q86 68 92 64" stroke="#d97706" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Pectoral fin -->
  <path d="M45 70 Q42 78 48 80 Q52 76 50 70" fill="#fbbf24" opacity="0.7"/>
  <!-- Scale pattern -->
  <path d="M48 55 Q52 53 56 55" stroke="#d97706" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M54 58 Q58 56 62 58" stroke="#d97706" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M50 62 Q54 60 58 62" stroke="#d97706" stroke-width="0.6" fill="none" opacity="0.3"/>
  <!-- Cloud/murk overlay -->
  <ellipse cx="85" cy="45" rx="12" ry="8" fill="#fcd34d" opacity="0.3"/>
  <ellipse cx="25" cy="75" rx="10" ry="6" fill="#fcd34d" opacity="0.25"/>
</svg>