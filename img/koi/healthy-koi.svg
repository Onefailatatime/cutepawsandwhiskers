<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clean water background -->
  <circle cx="60" cy="60" r="56" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
  <ellipse cx="60" cy="60" rx="48" ry="48" fill="#ecfdf5" opacity="0.5"/>
  <!-- Clean water ripples -->
  <path d="M20 52c12-4 22 4 35 0s22-4 35 0" stroke="#34d399" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M18 68c12-3 22 3 35 0s22-3 32 0" stroke="#34d399" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Koi body - vibrant -->
  <ellipse cx="56" cy="58" rx="26" ry="14" fill="#10b981"/>
  <ellipse cx="56" cy="58" rx="24" ry="12" fill="#34d399"/>
  <!-- White patches (classic koi pattern) -->
  <ellipse cx="50" cy="55" rx="8" ry="5" fill="white" opacity="0.7"/>
  <ellipse cx="64" cy="61" rx="6" ry="4" fill="white" opacity="0.6"/>
  <!-- Red/orange accent patches -->
  <ellipse cx="55" cy="58" rx="5" ry="3.5" fill="#f97316" opacity="0.6"/>
  <ellipse cx="68" cy="56" rx="4" ry="3" fill="#f97316" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="36" cy="58" rx="15" ry="13" fill="#10b981"/>
  <ellipse cx="36" cy="58" rx="13.5" ry="11.5" fill="#34d399"/>
  <!-- Head white patch -->
  <ellipse cx="36" cy="55" rx="7" ry="5" fill="white" opacity="0.5"/>
  <!-- Eye - alert and bright -->
  <circle cx="30" cy="55" r="4.5" fill="white"/>
  <circle cx="29" cy="54.5" r="2.5" fill="#064e3b"/>
  <circle cx="28.2" cy="53.7" r="1" fill="white"/>
  <!-- Mouth -->
  <path d="M23 60 Q25 63 29 62" stroke="#065f46" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <path d="M24 58 Q18 54 13 52" stroke="#065f46" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M24 61 Q18 63 13 66" stroke="#065f46" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Dorsal fin (tall, healthy) -->
  <path d="M48 45 Q54 32 62 44" fill="#10b981" opacity="0.8"/>
  <path d="M52 42 Q55 36 58 42" stroke="#065f46" stroke-width="0.5" fill="none" opacity="0.3"/>
  <!-- Tail fin (spread wide - healthy) -->
  <path d="M78 52 Q90 40 98 46 Q92 55 98 64 Q90 72 78 62" fill="#10b981" opacity="0.85"/>
  <path d="M80 54 Q88 44 95 48" stroke="#047857" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M80 60 Q88 68 95 62" stroke="#047857" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M82 57 Q90 55 93 55" stroke="#047857" stroke-width="0.6" fill="none" opacity="0.2"/>
  <!-- Pectoral fin -->
  <path d="M42 69 Q38 80 46 82 Q50 77 48 69" fill="#34d399" opacity="0.7"/>
  <!-- Scale details -->
  <path d="M44 53 Q48 51 52 53" stroke="#047857" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M50 56 Q54 54 58 56" stroke="#047857" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M46 60 Q50 58 54 60" stroke="#047857" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M56 53 Q60 51 64 53" stroke="#047857" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M52 63 Q56 61 60 63" stroke="#047857" stroke-width="0.6" fill="none" opacity="0.25"/>
  <!-- Sparkle/shine -->
  <path d="M70 40 l0 -4 M68 38 l4 0" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M85 35 l0 -3 M83.5 33.5 l3 0" stroke="#6ee7b7" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>