<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Golden/premium water background -->
  <defs>
    <radialGradient id="apex-bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </radialGradient>
    <linearGradient id="gold-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#apex-bg)" stroke="#a3e635" stroke-width="2"/>
  <!-- Radiant lines -->
  <path d="M60 8 L60 18" stroke="#fbbf24" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M90 15 L84 24" stroke="#fbbf24" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M30 15 L36 24" stroke="#fbbf24" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M105 40 L96 44" stroke="#fbbf24" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M15 40 L24 44" stroke="#fbbf24" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Large majestic koi body -->
  <ellipse cx="54" cy="58" rx="28" ry="15" fill="url(#gold-body)" opacity="0.95"/>
  <ellipse cx="54" cy="58" rx="26" ry="13" fill="#ef4444"/>
  <!-- White patches (premium kohaku pattern) -->
  <ellipse cx="44" cy="54" rx="9" ry="6" fill="white" opacity="0.75"/>
  <ellipse cx="60" cy="62" rx="7" ry="4.5" fill="white" opacity="0.65"/>
  <ellipse cx="70" cy="55" rx="5" ry="3.5" fill="white" opacity="0.5"/>
  <!-- Gold shimmer -->
  <ellipse cx="50" cy="57" rx="4" ry="2.5" fill="#fbbf24" opacity="0.4"/>
  <!-- Head - powerful -->
  <ellipse cx="32" cy="58" rx="16" ry="14" fill="#dc2626"/>
  <ellipse cx="32" cy="58" rx="14.5" ry="12.5" fill="#ef4444"/>
  <!-- Head white crown -->
  <ellipse cx="32" cy="53" rx="8" ry="5.5" fill="white" opacity="0.6"/>
  <!-- Eye - fierce, confident -->
  <circle cx="26" cy="55" r="5" fill="white"/>
  <circle cx="25" cy="54.5" r="2.8" fill="#7f1d1d"/>
  <circle cx="24" cy="53.5" r="1.1" fill="white"/>
  <!-- Gold eye ring -->
  <circle cx="26" cy="55" r="5" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <!-- Mouth - determined -->
  <path d="M18 60 Q21 64 26 62" stroke="#991b1b" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Whiskers (long, flowing) -->
  <path d="M20 57 Q12 52 7 49" stroke="#991b1b" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M20 61 Q12 64 7 68" stroke="#991b1b" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- Dorsal fin (tall, majestic) -->
  <path d="M44 43 Q52 26 64 42" fill="#dc2626" opacity="0.85"/>
  <path d="M48 38 Q54 30 58 38" stroke="#991b1b" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M50 40 Q54 34 56 40" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <!-- Tail fin (massive, powerful spread) -->
  <path d="M78 50 Q92 36 102 42 Q95 52 102 62 Q92 72 78 64" fill="#dc2626" opacity="0.9"/>
  <path d="M80 52 Q90 40 99 44" stroke="#991b1b" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M80 62 Q90 72 99 66" stroke="#991b1b" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M82 55 Q92 50 98 50" stroke="#991b1b" stroke-width="0.6" fill="none" opacity="0.2"/>
  <path d="M82 60 Q92 62 98 58" stroke="#991b1b" stroke-width="0.6" fill="none" opacity="0.2"/>
  <!-- Pectoral fins (flowing) -->
  <path d="M38 70 Q32 82 42 85 Q48 79 46 70" fill="#ef4444" opacity="0.7"/>
  <path d="M50 70 Q48 80 54 82 Q58 76 56 70" fill="#ef4444" opacity="0.6"/>
  <!-- Scale pattern (more detailed for premium) -->
  <path d="M40 53 Q44 51 48 53" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M46 56 Q50 54 54 56" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M42 60 Q46 58 50 60" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M52 53 Q56 51 60 53" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M48 63 Q52 61 56 63" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M56 57 Q60 55 64 57" stroke="#991b1b" stroke-width="0.5" fill="none" opacity="0.2"/>
  <!-- Crown/sparkles (it's the apex!) -->
  <path d="M28 38 l0 -5 M26 35.5 l4 0" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M75 30 l0 -4 M73.5 28 l3 0" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M92 28 l0 -3 M90.5 26.5 l3 0" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <circle cx="22" cy="34" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="80" cy="26" r="1" fill="#fbbf24" opacity="0.4"/>
</svg>