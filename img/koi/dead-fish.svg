<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Stagnant water background -->
  <circle cx="60" cy="60" r="56" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <ellipse cx="60" cy="60" rx="48" ry="48" fill="#f9fafb" opacity="0.5"/>
  <!-- Murky bottom -->
  <path d="M15 80c10-2 20 2 30 0s20-2 30 0s20 2 30 0" stroke="#d1d5db" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Fish body (belly up - flipped) -->
  <ellipse cx="58" cy="60" rx="26" ry="13" fill="#9ca3af" opacity="0.8"/>
  <ellipse cx="58" cy="60" rx="24" ry="11" fill="#d1d5db"/>
  <!-- Faded patches -->
  <ellipse cx="50" cy="62" rx="7" ry="4" fill="#e5e7eb" opacity="0.6"/>
  <ellipse cx="64" cy="58" rx="5" ry="3.5" fill="#e5e7eb" opacity="0.5"/>
  <!-- Belly (showing - flipped over) -->
  <ellipse cx="55" cy="62" rx="16" ry="6" fill="#f3f4f6" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="38" cy="60" rx="15" ry="13" fill="#9ca3af"/>
  <ellipse cx="38" cy="60" rx="13.5" ry="11.5" fill="#d1d5db"/>
  <!-- X eyes (dead) -->
  <circle cx="32" cy="57" r="4.5" fill="white" opacity="0.8"/>
  <path d="M29.5 54.5 L34.5 59.5 M34.5 54.5 L29.5 59.5" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
  <!-- Mouth (open, lifeless) -->
  <ellipse cx="24" cy="61" rx="3" ry="2" fill="#6b7280" opacity="0.4"/>
  <!-- Whiskers (drooping) -->
  <path d="M26 59 Q20 62 16 66" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M26 62 Q22 67 18 72" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Dorsal fin (collapsed) -->
  <path d="M50 48 Q53 44 56 47" fill="#9ca3af" opacity="0.5"/>
  <!-- Tail fin (limp) -->
  <path d="M80 55 Q86 50 90 53 Q88 58 90 63 Q86 67 80 62" fill="#9ca3af" opacity="0.6"/>
  <!-- Pectoral fin (stiff) -->
  <path d="M44 71 Q42 78 46 79 Q48 76 47 71" fill="#d1d5db" opacity="0.5"/>
  <!-- Stink lines / warning -->
  <path d="M45 38 Q43 32 45 28" stroke="#ef4444" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M55 35 Q53 29 55 25" stroke="#ef4444" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M65 38 Q63 32 65 28" stroke="#ef4444" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Skull/crossbones subtle hint -->
  <circle cx="90" cy="85" r="6" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.25"/>
  <path d="M88 84 L92 84 M90 82 L90 86" stroke="#ef4444" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>
</svg>